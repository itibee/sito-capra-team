<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photogallery Under 17 | Capra Team Ravenna</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold:'#FBBF24', dark:'#0A0A0A', box:'#1A1A1A' },
          fontFamily: { heading:['Syncopate'], sans:['Inter'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">
  <div id="navbar-container"></div>

  <header class="relative min-h-[45vh] flex items-center justify-center text-center overflow-hidden pt-24">
    <img src="/assets/images/hero-home.jpg" alt="Hero U17" class="absolute inset-0 w-full h-full object-cover opacity-40">
    <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
    <div class="relative z-10 px-4">
      <span class="text-gold font-heading text-xs sm:text-sm tracking-[0.35em] block">PHOTOGALLERY GIOVANILI</span>
      <h1 class="text-4xl sm:text-6xl font-black uppercase tracking-tighter mt-4">Under 17</h1>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">
      <a href="gallery-u17-home-opener.html" class="bg-box border border-white/5 rounded-2xl overflow-hidden hover:border-gold/40 transition">
        <img src="/assets/images/gallery-u17-cover.jpg" alt="Under 17 Home Opener" class="w-full h-60 object-cover">
        <div class="p-6">
          <span class="text-gold text-xs uppercase font-bold">Under 17</span>
          <h2 class="font-black text-xl mt-2">Home Opener U17</h2>
          <p class="text-gray-400 mt-3">La galleria della prima partita casalinga della stagione.</p>
        </div>
      </a>
    </div>
  </main>

  <div id="footer-container"></div>
  <script src="/js/main.js"></script>
</body>
</html>
