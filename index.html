<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capra Team Ravenna | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#FBBF24', dark: '#0A0A0A', box: '#1A1A1A' },
                    fontFamily: { heading: ['Syncopate'], sans: ['Inter'] }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white font-sans">

    <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="./img/logocaprateam.jpg" class="w-12 h-12 rounded-full border border-gold/50 object-cover" alt="Logo">
                <span class="font-heading text-xl tracking-tighter uppercase">Capra <span class="text-gold">Team</span></span>
            </div>
            <div class="hidden md:flex gap-8 font-bold uppercase text-xs tracking-widest">
                <a href="index.html" class="text-gold">Home</a>
                <a href="roster.html">Serie B</a>
                <a href="chi-siamo.html">La Storia</a>
                <a href="contatti.html">Contatti</a>
            </div>
        </div>
    </nav>

    <main class="pt-20">
        <header class="relative h-[80vh] flex flex-col justify-center items-center text-center px-4">
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000')] bg-cover bg-center opacity-40"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
            
            <div class="relative z-10">
                <span class="text-gold font-heading text-sm mb-4 tracking-[0.4em] block text-center">RAVENNA BASKET</span>
                <h1 class="editable text-6xl md:text-8xl font-black mb-6 uppercase tracking-tighter text-center">
                    Testa.<br>Cuore.<br><span class="text-gold">Capra.</span>
                </h1>
                <a href="roster.html" class="bg-gold text-black px-8 py-4 font-bold uppercase rounded inline-block hover:scale-105 transition">Scopri la Squadra</a>
            </div>
        </header>

        <section class="py-24 max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div>
                <span class="text-gold font-bold uppercase text-xs tracking-widest">In Evidenza</span>
                <h2 class="editable font-heading text-4xl mt-2 mb-6 text-white italic">Insieme a <span class="text-pink-500">Linea Rosa</span></h2>
                <p class="editable text-gray-400 mb-6 leading-relaxed">
                    Il Capra Team scende in campo contro la violenza sulle donne. Grande successo per l'iniziativa al Pala Mattioli.
                </p>
            </div>
            <div class="relative group">
                <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=800" class="editable relative rounded-2xl shadow-2xl" alt="News">
            </div>
        </section>
    </main>

    <footer class="bg-black py-12 border-t border-white/10 text-center text-sm text-gray-500">
        <p>© 2026 Capra Team Ravenna ASD</p>
    </footer>

</body>
</html>
