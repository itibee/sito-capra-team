<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capra Team | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#FBBF24', dark: '#0A0A0A' },
                    fontFamily: { heading: ['Syncopate'], sans: ['Inter'] }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white font-sans">

    <nav class="sticky top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-white/5 py-3 px-6 text-white text-xs font-bold uppercase tracking-widest flex justify-between items-center">
        <a href="index.html">Capra Team</a>
        <div class="flex gap-6">
            <a href="index.html" class="text-gold">Home</a>
            <a href="roster.html">Serie B</a>
            <a href="chi-siamo.html">La Storia</a>
            <a href="contatti.html">Contatti</a>
        </div>
    </nav>

    <main>
        <header class="relative min-h-[80vh] flex flex-col items-center justify-center text-center px-4">
            <img 
                data-editable="source" 
                data-path="index.html" 
                data-key="hero_bg" 
                src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000" 
                class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale">
            
            <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
            
            <div class="relative z-10">
                <span 
                    data-editable="source" data-path="index.html" data-key="hero_kicker"
                    class="text-gold font-heading text-sm mb-6 tracking-[0.4em] block uppercase">RAVENNA BASKET</span>
                
                <h1 class="text-6xl md:text-8xl font-black mb-10 uppercase tracking-tighter leading-none">
                    <span data-editable="source" data-path="index.html" data-key="h1_line1">Testa.</span><br>
                    <span data-editable="source" data-path="index.html" data-key="h1_line2">Cuore.</span><br>
                    <span data-editable="source" data-path="index.html" data-key="h1_line3" class="text-gold italic">Capra.</span>
                </h1>
            </div>
        </header>

        <section class="py-24 max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div class="space-y-6">
                <h2 
                    data-editable="source" data-path="index.html" data-key="news_title"
                    class="font-heading text-4xl text-white italic">Insieme a <span class="text-pink-500">Linea Rosa</span></h2>
                
                <p 
                    data-editable="source" data-path="index.html" data-key="news_text"
                    class="text-gray-400 text-lg leading-relaxed">
                    Il Capra Team scende in campo contro la violenza sulle donne. Grande successo per l'iniziativa al Pala Mattioli.
                </p>
            </div>
            
            <div class="relative">
                <img 
                    data-editable="source" data-path="index.html" data-key="news_img"
                    src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=800" 
                    class="rounded-2xl shadow-2xl w-full h-auto object-cover" alt="Iniziativa Sociale">
            </div>
        </section>
    </main>

    <footer class="bg-black py-12 border-t border-white/5 text-center text-[10px] font-bold uppercase tracking-[0.3em] text-gray-600">
        <p data-editable="source" data-path="index.html" data-key="footer_cr">© 2026 Capra Team Ravenna ASD</p>
    </footer>

</body>
</html>
