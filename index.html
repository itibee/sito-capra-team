<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capra Team Ravenna | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#FBBF24', dark: '#0A0A0A', box: '#1A1A1A' },
                    fontFamily: { heading: ['Syncopate'], sans: ['Inter'] }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white font-sans">

    <nav class="sticky top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-white/5 py-3 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="./img/logocaprateam.jpg" class="w-12 h-12 rounded-full border border-gold/50 object-cover" alt="Logo">
                <span class="font-heading text-xl tracking-tighter uppercase leading-none">Capra <span class="text-gold">Team</span></span>
            </div>
            <div class="hidden md:flex gap-8 font-semibold uppercase text-xs tracking-widest">
                <a href="index.html" class="text-gold">Home</a>
                <a href="roster.html" class="hover:text-gold transition">Serie B</a>
                <a href="chi-siamo.html" class="hover:text-gold transition">La Storia</a>
                <a href="contatti.html" class="hover:text-gold transition">Contatti</a>
            </div>
        </div>
    </nav>

    <main class="editable pb-24">
        
        <header class="relative min-h-[85vh] flex flex-col items-center justify-center text-center px-4 overflow-hidden border-b border-white/5">
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000')] bg-cover bg-center grayscale opacity-15"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
            
            <div class="relative z-10 max-w-5xl mx-auto py-32 flex flex-col items-center">
                <span class="text-gold font-heading text-sm mb-6 tracking-[0.4em] block uppercase text-center">RAVENNA BASKET</span>
                <h1 class="text-6xl md:text-8xl font-black mb-10 uppercase tracking-tighter text-center leading-[0.95] text-white">
                    Testa.<br>Cuore.<br><span class="text-gold">Capra.</span>
                </h1>
                <a href="roster.html" class="bg-gold text-black px-10 py-5 font-bold uppercase rounded inline-block hover:scale-105 transition shadow-lg text-sm">Scopri la Squadra</a>
            </div>
        </header>

        <section class="py-24 max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div class="space-y-6">
                <span class="text-gold font-bold uppercase text-xs tracking-widest">In Evidenza</span>
                <h2 class="font-heading text-4xl mt-2 mb-6 text-white leading-tight text-left">Insieme a <span class="text-pink-500">Linea Rosa</span></h2>
                <p class="text-gray-400 mb-6 leading-relaxed text-lg max-w-xl text-left">
                    Il Capra Team scende in campo contro la violenza sulle donne. Grande successo per l'iniziativa al Pala Mattioli.
                </p>
                <div class="text-left">
                    <a href="chi-siamo.html" class="border-b-2 border-gold pb-1 font-semibold uppercase text-sm hover:text-gold transition inline-block">La nostra missione →</a>
                </div>
            </div>
            <div class="relative group">
                <div class="absolute -inset-1 bg-gold/20 rounded-2xl blur-lg opacity-25 group-hover:opacity-50 transition duration-500"></div>
                <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=800" class="relative rounded-2xl shadow-2xl" alt="Iniziativa Sociale">
            </div>
        </section>

    </main>

    <footer class="bg-black py-16 border-t border-white/5 text-center text-sm text-gray-600">
        <p>© 2026 Capra Team Ravenna ASD</p>
    </footer>

</body>
</html>
