<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album | Capra Team Ravenna</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold:'#FBBF24', dark:'#0A0A0A', box:'#1A1A1A' },
          fontFamily: { heading:['Syncopate'], sans:['Inter'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">

  <div id="navbar-container"></div>

  <header class="relative min-h-[60vh] flex items-end overflow-hidden pt-24">
    <img id="album-cover" src="" alt="" class="absolute inset-0 w-full h-full object-cover opacity-35">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 w-full pb-12">
      <p id="album-category" class="text-gold text-xs font-bold uppercase tracking-[0.2em] mb-4"></p>
      <h1 id="album-title" class="text-3xl sm:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-tight"></h1>
      <p id="album-meta" class="text-gray-300 mt-4 text-sm sm:text-base"></p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
    <a href="photogallery.html" class="inline-block mb-8 border-b-2 border-gold pb-1 font-bold uppercase text-sm hover:text-gold transition">
      ← Torna alla photogallery
    </a>

    <section class="bg-box border border-white/5 rounded-2xl p-6 sm:p-10 mb-10">
      <p id="album-cover-caption" class="text-gray-300 text-lg leading-relaxed"></p>
    </section>

    <section id="album-grid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></section>
  </main>

  <div id="footer-container"></div>
  <script src="/js/main.js"></script>

  <script>
    function escapeHtml(value) {
      const str = String(value ?? "");
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDateValue(value) {
      if (!value) return "";
      const date = value instanceof Date ? value : new Date(value);
      if (isNaN(date.getTime())) return String(value);

      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    async function loadGalleryPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      try {
        const res = await fetch('data/galleries.yml', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        const data = jsyaml.load(text) || {};
        const items = Array.isArray(data.gallery_items) ? data.gallery_items : [];
        const item = items.find(g => g.slug === slug);

        if (!item) {
          document.body.innerHTML = `
            <div style="padding:40px;color:white;background:#0A0A0A;font-family:sans-serif;min-height:100vh;">
              Album non trovato.
            </div>
          `;
          return;
        }

        document.title = `${item.title} | Capra Team Ravenna`;

        document.getElementById('album-cover').src = item.cover_image || '/assets/images/hero-home.jpg';
        document.getElementById('album-cover').alt = item.title || '';
        document.getElementById('album-category').textContent = item.category || 'Photogallery';
        document.getElementById('album-title').textContent = item.title || '';
        document.getElementById('album-meta').textContent = `${item.team || ''} · ${formatDateValue(item.date)}`;
        document.getElementById('album-cover-caption').textContent = item.cover_caption || '';

        const albumGrid = document.getElementById('album-grid');
        const images = Array.isArray(item.gallery_images) ? item.gallery_images : [];

        if (images.length === 0) {
          albumGrid.innerHTML = `
            <div class="xl:col-span-3 bg-box rounded-2xl border border-white/5 p-8 text-center text-gray-400">
              Nessuna immagine disponibile per questo album.
            </div>
          `;
          return;
        }

        albumGrid.innerHTML = images.map(photo => `
          <figure class="bg-box border border-white/5 rounded-2xl overflow-hidden">
            <img src="${escapeHtml(photo.image || '')}" alt="${escapeHtml(photo.caption || item.title || '')}" class="w-full h-80 object-cover">
            <figcaption class="p-4 text-sm text-gray-400">
              ${escapeHtml(photo.caption || '')}
            </figcaption>
          </figure>
        `).join('');
      } catch (error) {
        console.error('Errore caricamento album:', error);
        document.body.innerHTML = `
          <div style="padding:40px;color:white;background:#0A0A0A;font-family:sans-serif;min-height:100vh;">
            Errore nel caricamento dell’album.
          </div>
        `;
      }
    }

    loadGalleryPost();
  </script>
</body>
</html>
