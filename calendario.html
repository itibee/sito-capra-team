    const lastRoundNumber = 25;
    const nextRoundNumber = 26;

    const select = document.getElementById("giornata-select");
    const renderBox = document.getElementById("giornata-render");
    const lastRoundCard = document.getElementById("last-round-card");
    const nextRoundCard = document.getElementById("next-round-card");

    function buildMatchRows(matches, compact = false) {
      return matches.map(match => {
        const highlightClass = match.highlight ? "font-bold text-white" : "";
        const infoClass = match.highlight ? "text-gold font-bold" : "";
        const padding = compact ? "pb-3" : "pb-4";
        return `
          <div class="flex flex-col md:flex-row md:justify-between gap-2 border-b border-white/10 ${padding}">
            <span class="${highlightClass}">${match.home} vs ${match.away}</span>
            <span class="${infoClass}">${match.info}</span>
          </div>
        `;
      }).join("");
    }

    function renderHighlightCard(target, label, badge, roundNumber, badgeClass) {
      const round = giornate[roundNumber];
      target.innerHTML = `
        <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
          <div>
            <span class="text-gold font-bold uppercase text-xs tracking-widest block">${label}</span>
            <span class="text-sm text-gray-400 block mt-2">${roundNumber}ª giornata · ${round.date}</span>
          </div>
          <span class="${badgeClass} text-xs font-black uppercase px-3 py-2 rounded-full">${badge}</span>
        </div>

        <div class="space-y-3 text-sm sm:text-base">
          ${buildMatchRows(round.matches, true)}
          <div class="flex flex-col md:flex-row md:justify-between gap-2 pt-1">
            <span class="font-bold text-white">A riposo: ${round.rest}</span>
            <span>-</span>
          </div>
        </div>
      `;
    }

    function buildSelect() {
      const numeri = Object.keys(giornate).map(Number).sort((a, b) => a - b);
      numeri.forEach((num) => {
        const option = document.createElement("option");
        option.value = num;
        option.textContent = `${num}ª giornata`;
        select.appendChild(option);
      });
      select.value = String(lastRoundNumber);
    }

    function renderGiornata(numero) {
      const round = giornate[numero];
      renderBox.innerHTML = `
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
          <h3 class="font-heading text-2xl uppercase text-gold">${numero}ª giornata</h3>
          <span class="text-sm text-gray-400">${round.date}</span>
        </div>

        <div class="space-y-4 text-sm sm:text-base">
          ${buildMatchRows(round.matches)}
          <div class="flex flex-col md:flex-row md:justify-between gap-2">
            <span class="font-bold text-white">A riposo: ${round.rest}</span>
            <span>-</span>
          </div>
        </div>
      `;
    }

    if (select && renderBox && lastRoundCard && nextRoundCard) {
      buildSelect();
      renderHighlightCard(
        lastRoundCard,
        "Ultima giornata giocata",
        "Risultati finali",
        lastRoundNumber,
        "bg-gold text-black"
      );
      renderHighlightCard(
        nextRoundCard,
        "Prossima giornata",
        "In programma",
        nextRoundNumber,
        "bg-white/10 text-white"
      );
      renderGiornata(lastRoundNumber);

      select.addEventListener("change", function () {
        renderGiornata(Number(this.value));
      });
    }
