<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News | Capra Team Ravenna</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold:'#FBBF24', dark:'#0A0A0A', box:'#1A1A1A' },
          fontFamily: { heading:['Syncopate'], sans:['Inter'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">

  <div id="navbar-container"></div>

  <header id="hero" class="relative min-h-[55vh] flex items-end overflow-hidden pt-24">
    <img id="hero-image" src="" alt="" class="absolute inset-0 w-full h-full object-cover opacity-35">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 w-full pb-12">
      <p id="article-category" class="text-gold text-xs font-bold uppercase tracking-[0.2em] mb-4"></p>
      <h1 id="article-title" class="text-3xl sm:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-tight"></h1>
      <p id="article-date" class="text-gray-300 mt-4 text-sm sm:text-base"></p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
    <a href="news.html" class="inline-block mb-8 border-b-2 border-gold pb-1 font-bold uppercase text-sm hover:text-gold transition">
      ← Torna alle news
    </a>

    <article class="bg-box border border-white/5 rounded-2xl p-6 sm:p-10">
      <div id="article-body" class="prose prose-invert max-w-none prose-p:text-gray-300 prose-headings:text-white"></div>
    </article>
  </main>

  <div id="footer-container"></div>
  <script src="/js/main.js"></script>

  <script>
    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      const res = await fetch('/data/news.yml');
      const text = await res.text();
      const data = jsyaml.load(text);
      const items = data.news_items || [];
      const item = items.find(n => n.slug === slug);

      if (!item) {
        document.body.innerHTML = '<div style="padding:40px;color:white;background:#0A0A0A;font-family:sans-serif">Articolo non trovato.</div>';
        return;
      }

      document.title = `${item.title} | Capra Team Ravenna`;
      document.getElementById('hero-image').src = item.image;
      document.getElementById('hero-image').alt = item.title;
      document.getElementById('article-category').textContent = item.category;
      document.getElementById('article-title').textContent = item.title;
      document.getElementById('article-date').textContent = item.date;
      document.getElementById('article-body').innerHTML = item.body_html || '';
    }

    loadArticle();
  </script>
</body>
</html>
