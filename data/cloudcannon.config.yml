_inputs:
  news_items:
    label: Articoli News
    type: array
    options:
      structures: _structures.news_item

  title:
    label: Titolo
    type: text

  slug:
    label: Slug URL
    type: text
    comment: "Usa solo minuscolo e trattini. Esempio: capra-summer-camp"

  category:
    label: Categoria
    type: select
    options:
      values:
        - Società
        - Serie B
        - Giovanili
        - Eventi

  date:
    label: Data
    type: date

  image:
    label: Immagine copertina
    type: image

  excerpt:
    label: Estratto breve
    type: text

  featured:
    label: In evidenza
    type: boolean

  body_html:
    label: Contenuto articolo
    type: html

_structures:
  news_item:
    style: modal
    values:
      - label: Articolo News
        value:
          title: "Nuova news"
          slug: "nuova-news"
          category: "Società"
          date: 2026-03-24
          image: "/assets/images/placeholder-news.jpg"
          excerpt: "Scrivi qui il riassunto breve."
          featured: false
          body_html: |
            <p>Scrivi qui il contenuto completo dell’articolo.</p>