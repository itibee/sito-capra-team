_inputs:
  gallery_items:
    label: Album Photogallery
    type: array
    options:
      structures: _structures.gallery_item

  gallery_images:
    label: Foto dell'album
    type: array
    options:
      structures: _structures.gallery_image

  cover_image:
    label: Immagine copertina album
    type: image

  cover_caption:
    label: Caption copertina album
    type: text

  excerpt:
    label: Testo breve album
    type: text

  category:
    label: Macro categoria
    type: select
    options:
      values:
        - Prima Squadra
        - Giovanili
        - Minibasket

  section:
    label: Sezione
    type: select
    options:
      values:
        - Serie B
        - Under 19
        - Under 17
        - Under 15
        - Under 13
        - Paperine
        - Libellule
        - Gazzelle Small
        - Gazzelle Big
        - Esordienti

_structures:
  gallery_item:
    style: modal
    values:
      - label: Nuovo album
        value:
          title: "Nuovo album"
          slug: "nuovo-album"
          category: "Giovanili"
          section: "Under 19"
          date: 2026-03-24
          cover_image: "/assets/images/gallery-giovanili-cover.png"
          cover_caption: "Scrivi qui la caption della copertina."
          excerpt: "Scrivi qui una breve descrizione dell’album."
          featured: false
          gallery_images:
            - image: "/assets/images/gallery-giovanili-cover.png"
              caption: "Scrivi qui la caption della foto."

  gallery_image:
    style: modal
    values:
      - label: Foto
        value:
          image: "/assets/images/gallery-giovanili-cover.png"
          caption: "Scrivi qui la caption della foto."