  - title: 'Insieme a Linea Rosa: il basket che lascia il segno'
    slug: linea-rosa
    category: Società
    date: 2026-03-20T00:00:00Z
    image: /assets/images/linea-rosa.jpeg
    excerpt: Il Capra Team scende in campo anche fuori dal parquet.
    featured: true
    body_html: >
      <p>Il Capra Team Ravenna scende in campo non solo per competere, ma anche
      per trasmettere valori forti e concreti.</p>

      <p>La collaborazione con Linea Rosa rappresenta una scelta chiara: usare
      lo sport come strumento di sensibilizzazione, partecipazione e vicinanza
      al territorio.</p>

      <p>Il basket diventa così linguaggio, responsabilità e presenza. Un modo
      per dire che appartenere al Capra Team significa vivere una comunità e non
      solo una squadra.</p>
