      src="https://static.xx.fbcdn.net/images/emoji.php/v9/t6a/1/16/1f46f_200d_2640.png"
      /></p><p>Perché 𝐶𝑎𝑝𝑟𝑎 𝑆𝑢𝑚𝑚𝑒𝑟 𝐶𝑎𝑚𝑝 è:</p><p><img height="16"
