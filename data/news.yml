      <p>𝐆𝐎𝐀𝐓 𝐱 𝐂𝐀𝐏𝐑𝐀 𝐓𝐄𝐀𝐌 𝐑𝐀𝐕𝐄𝐍𝐍𝐀<br /><br />Nel 2012
      nasce il 𝘊𝘈𝘗𝘙𝘈 𝘛𝘌𝘈𝘔, la squadra di basket femminile di
      𝘙𝘈𝘝𝘌𝘕𝘕𝘈.<br />Verde, bianco e nero i nostri colori.<br />Il basket
      la nostra passione. La nostra scuola di vita.<br /><br />Impegno.
      Rispetto. Amicizia. Unione. Spirito di gruppo.<br />È questo che ci ha
      portato fin qui. Insieme.<br /><br />Oggi eravamo tutte al cinema, in una
      sala riservata solo per noi.<br />Verde, bianca e nera. Come noi. Come
      GOAT.<br /><br />𝘗𝘦𝘳𝘤𝘩𝘦’ “𝘊𝘢𝘱𝘳𝘢”, 𝘪𝘯 𝘪𝘯𝘨𝘭𝘦𝘴𝘦, 𝘴𝘪
