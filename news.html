<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Capra Team Ravenna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config={theme:{extend:{colors:{gold:'#FBBF24',dark:'#0A0A0A',box:'#1A1A1A'},fontFamily:{heading:['Syncopate'],sans:['Inter']}}}}</script>
</head>
<body class="bg-dark text-white font-sans">

    <div id="navbar-container"></div>

    <main class="py-24 px-6 max-w-7xl mx-auto mt-20">
        <h1 class="font-heading text-5xl mb-12 uppercase border-l-4 border-gold pl-4">Press <span class="text-gold">Room</span></h1>

        <div class="grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2 space-y-12">
                <article class="relative rounded-2xl overflow-hidden group">
                    <img src="https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=1200" class="w-full h-[400px] object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent p-8 flex flex-col justify-end">
                        <span class="bg-gold text-black text-xs font-bold uppercase w-fit px-3 py-1 mb-4">Comunicato Ufficiale</span>
                        <h2 class="text-4xl font-black mb-2 uppercase tracking-tighter">Capra Team e Linea Rosa: Il resoconto dell'8 Marzo</h2>
                        <a href="#" class="text-gold font-bold uppercase text-sm">Leggi tutto →</a>
                    </div>
                </article>
                <div class="grid md:grid-cols-2 gap-8 border-t border-white/10 pt-12">
                    <article>
                        <img src="https://images.unsplash.com/photo-1519861531473-9200362188bf?q=80&w=600" class="w-full h-48 object-cover rounded-xl mb-4">
                        <span class="text-gold text-xs font-bold uppercase">Serie B</span>
                        <h3 class="text-xl font-black mt-1 mb-2 leading-tight">Vittoria al cardiopalma contro il Noceto</h3>
                    </article>
                </div>
            </div>
            <aside class="space-y-8">
                <div class="bg-gradient-to-br from-gold to-yellow-600 p-8 rounded-xl text-black text-center">
                    <h3 class="font-black text-2xl uppercase mb-2">Diventa Sponsor</h3>
                    <p class="text-sm mb-4">Lega il tuo brand all'eccellenza del basket femminile ravennate.</p>
                    <a href="contatti.html" class="bg-black text-white px-6 py-2 rounded font-bold uppercase text-xs">Contattaci</a>
                </div>
            </aside>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/main.js"></script>
</body>
</html>
