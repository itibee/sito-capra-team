<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News | Capra Team Ravenna</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold:'#FBBF24', dark:'#0A0A0A', box:'#1A1A1A' },
          fontFamily: { heading:['Syncopate'], sans:['Inter'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">

  <div id="navbar-container"></div>

  <header class="relative min-h-[60vh] flex items-end overflow-hidden pt-24">
    <img src="/assets/images/hero-home.jpg" alt="News Capra Team Ravenna" class="absolute inset-0 w-full h-full object-cover opacity-30">
    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/70 to-black/20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent to-transparent"></div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 w-full pb-12">
      <span class="text-gold font-heading text-xs sm:text-sm tracking-[0.35em] block mb-5">CAPRA TEAM RAVENNA</span>
      <h1 class="text-4xl sm:text-6xl font-black uppercase tracking-tighter">News</h1>
      <p class="text-gray-300 mt-4 max-w-2xl">Notizie, eventi, aggiornamenti e storie dal mondo Capra Team Ravenna.</p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
    <div class="mb-10">
      <p class="text-gold text-xs font-bold uppercase tracking-[0.2em]">Archivio</p>
      <h2 class="font-heading text-3xl sm:text-4xl uppercase mt-2">Tutte le news</h2>
    </div>

    <div id="news-grid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
  </main>

  <div id="footer-container"></div>
  <script src="/js/main.js"></script>

  <script>
    async function loadNews() {
      const res = await fetch('/data/news.yml');
      const text = await res.text();
      const data = jsyaml.load(text);
      const items = (data.news_items || []).sort((a, b) => new Date(b.date) - new Date(a.date));

      const grid = document.getElementById('news-grid');

      grid.innerHTML = items.map(item => `
        <a href="news-post.html?slug=${item.slug}" class="group block">
          <article class="bg-box rounded-2xl border border-white/5 overflow-hidden h-full hover:border-gold/30 transition">
            <img src="${item.image}" alt="${item.title}" class="w-full h-56 object-cover">
            <div class="p-6">
              <p class="text-gold text-xs font-bold uppercase tracking-[0.18em]">${item.category}</p>
              <h3 class="text-xl font-black mt-3 leading-tight group-hover:text-gold transition">${item.title}</h3>
              <p class="text-gray-400 mt-4 text-sm">${item.excerpt}</p>
              <p class="text-gray-500 mt-4 text-xs uppercase tracking-[0.15em]">${item.date}</p>
            </div>
          </article>
        </a>
      `).join('');
    }

    loadNews();
  </script>
</body>
</html>
