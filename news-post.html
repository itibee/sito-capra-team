<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News | Capra Team Ravenna</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold:'#1e6b3f', dark:'#0A0A0A', box:'#1A1A1A' },
          fontFamily: { heading:['Syncopate'], sans:['Inter'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">

  <div id="navbar-container"></div>

  <header id="hero" class="relative min-h-[55vh] flex items-end overflow-hidden pt-24">
    <img id="hero-image" src="" alt="" class="absolute inset-0 w-full h-full object-cover opacity-35">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 w-full pb-12">
      <p id="article-category" class="text-gold text-xs font-bold uppercase tracking-[0.2em] mb-4"></p>
      <h1 id="article-title" class="text-3xl sm:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-tight"></h1>
      <p id="article-date" class="text-gray-300 mt-4 text-sm sm:text-base"></p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
    <a href="news.html" class="inline-block mb-8 border-b-2 border-gold pb-1 font-bold uppercase text-sm hover:text-gold transition">
      ← Torna alle news
    </a>

    <article class="bg-box border border-white/5 rounded-2xl p-6 sm:p-10">
      <div id="article-content-image-wrapper" class="hidden mb-8">
        <img id="article-content-image" src="" alt="" class="w-full rounded-2xl">
        <p id="article-content-image-caption" class="text-gray-400 text-sm mt-3"></p>
      </div>

      <div id="article-body" class="prose prose-invert max-w-none prose-p:text-gray-300 prose-headings:text-white prose-strong:text-white"></div>
    </article>
  </main>

  <div id="footer-container"></div>
  <script src="/js/main.js"></script>

  <script>
    function formatDateValue(value) {
      if (!value) return "";
      const date = value instanceof Date ? value : new Date(value);
      if (isNaN(date.getTime())) return String(value);

      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      try {
        const res = await fetch('data/news.yml', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const text = await res.text();
        const data = jsyaml.load(text) || {};
        const items = Array.isArray(data.news_items) ? data.news_items : [];
        const item = items.find(n => n.slug === slug);

        if (!item) {
          document.body.innerHTML = `
            <div style="padding:40px;color:white;background:#0A0A0A;font-family:sans-serif;min-height:100vh;">
              Articolo non trovato.
            </div>
          `;
          return;
        }

        document.title = `${item.title} | Capra Team Ravenna`;

        const heroImage = document.getElementById('hero-image');
        const articleCategory = document.getElementById('article-category');
        const articleTitle = document.getElementById('article-title');
        const articleDate = document.getElementById('article-date');
        const articleBody = document.getElementById('article-body');

        heroImage.src = item.image || '/assets/images/hero-home.jpg';
        heroImage.alt = item.title || '';

        articleCategory.textContent = item.category || 'News';
        articleTitle.textContent = item.title || '';
        articleDate.textContent = formatDateValue(item.date);
        articleBody.innerHTML = item.body_html || '';

        const contentImageWrapper = document.getElementById('article-content-image-wrapper');
        const contentImage = document.getElementById('article-content-image');
        const contentImageCaption = document.getElementById('article-content-image-caption');

        if (item.content_image) {
          contentImage.src = item.content_image;
          contentImage.alt = item.title || '';
          contentImageWrapper.classList.remove('hidden');

          if (item.content_image_caption) {
            contentImageCaption.textContent = item.content_image_caption;
          } else {
            contentImageCaption.textContent = '';
          }
        }
      } catch (error) {
        console.error('Errore caricamento articolo:', error);
        document.body.innerHTML = `
          <div style="padding:40px;color:white;background:#0A0A0A;font-family:sans-serif;min-height:100vh;">
            Errore nel caricamento dell’articolo.
          </div>
        `;
      }
    }

    loadArticle();
  </script>
</body>
</html>
