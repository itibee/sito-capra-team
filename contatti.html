<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Capra Team Ravenna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config={theme:{extend:{colors:{gold:'#FBBF24',dark:'#0A0A0A',box:'#1A1A1A'},fontFamily:{heading:['Syncopate'],sans:['Inter']}}}}</script>
</head>
<body class="bg-dark text-white font-sans">

    <div id="navbar-container"></div>

    <main class="py-24 px-6 max-w-7xl mx-auto mt-20">
        <div class="grid lg:grid-cols-2 gap-16 mb-24">
            <div>
                <h1 class="font-heading text-5xl mb-6 uppercase">La Nostra <span class="text-gold">Tana</span></h1>
                <p class="text-gray-400 mb-10 leading-relaxed">Vuoi informazioni sui biglietti o sei un'azienda che vuole supportare il basket femminile a Ravenna? Scrivici.</p>
                <div class="space-y-6 mb-12">
                    <div class="flex items-center gap-4 border-b border-white/5 pb-4">
                        <i class="fas fa-map-marker-alt text-2xl text-gold w-8 text-center"></i>
                        <div><p class="font-bold text-lg uppercase">Pala Mattioli</p><p class="text-sm text-gray-500">Via Atalarico 5, 48121 Ravenna (RA)</p></div>
                    </div>
                    <div class="flex items-center gap-4 border-b border-white/5 pb-4">
                        <i class="fas fa-envelope text-2xl text-gold w-8 text-center"></i>
                        <div><p class="font-bold text-lg uppercase">Email</p><p class="text-sm text-gray-500">info@caprateamravenna.it</p></div>
                    </div>
                </div>
                <form class="space-y-4">
                    <input type="text" placeholder="NOME E COGNOME" class="w-full bg-box border border-white/10 rounded-lg p-4 focus:outline-none focus:border-gold font-bold text-sm">
                    <input type="email" placeholder="EMAIL" class="w-full bg-box border border-white/10 rounded-lg p-4 focus:outline-none focus:border-gold font-bold text-sm">
                    <textarea rows="4" placeholder="IL TUO MESSAGGIO" class="w-full bg-box border border-white/10 rounded-lg p-4 focus:outline-none focus:border-gold font-bold text-sm"></textarea>
                    <button type="button" class="bg-gold text-black w-full py-4 rounded-lg font-black uppercase">Invia Richiesta</button>
                </form>
            </div>
            <div class="space-y-12">
                <div class="rounded-2xl overflow-hidden border border-white/10 h-[400px]">
                    <iframe src="https://maps.google.com/maps?q=Pala+Mattioli+Ravenna&t=&z=15&ie=UTF8&iwloc=&output=embed" w-full h-full style="border:0; width: 100%; height: 100%; filter: invert(90%) hue-rotate(180deg);" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/main.js"></script>
</body>
</html>
